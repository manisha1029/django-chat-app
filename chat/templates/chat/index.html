<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Chat app</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .chat-card {
            max-width: 600px;
            margin: 60px auto;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
        #chat-messages {
            height: 300px;
            overflow-y: auto;
            background: #f1f3f4;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .chat-message {
            background: #fff;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card chat-card">
            <div class="card-header text-center bg-primary text-white">
                <h2 class="mb-0">Django Chat App {{ group_name }}</h2>
            </div>
            <div class="card-body">
                <div id="chat-messages"></div>
                <div class="input-group">
                    <input type="text" id="message-input" class="form-control" placeholder="Enter message...">
                    <button type="button" id="send-button" class="btn btn-primary">Send</button>
                </div>
            </div>
        </div>
    </div>
    {{ group_name|json_script:"group-name" }}
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        // Get group name from server.
        const groupName = JSON.parse(document.getElementById("group-name").textContent);
        console.log(groupName);

        // Make connection to server.
        const socket = new WebSocket("ws://" + window.location.host + "/ws/chat/" + groupName + "/");

        // Open connection when server is opened.
        socket.onopen = function(event) {
            console.log("WebSocket opened");
        }

        // Receive message from server.
        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const chatMessages = document.getElementById("chat-messages");
            const messageElement = document.createElement("div");
            messageElement.className = "chat-message";
            messageElement.textContent = data.message;
            chatMessages.appendChild(messageElement);
        }

        // Close connection when server is closed.
        socket.onclose = function(event) {
            console.log("WebSocket closed");
        }

        // Function to send message to server.
        function sendMessage(){
            const message = document.getElementById("message-input").value;
            socket.send(
                JSON.stringify({
                    "message": message
                })
            );
            document.getElementById("message-input").value = "";
        }

        // Send message to server when send button is clicked.
        document.getElementById("send-button").addEventListener("click", sendMessage);

        // Send message to server when enter is pressed.
        document.getElementById("message-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
